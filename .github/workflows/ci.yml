name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend tests + coverage
  # ─────────────────────────────────────────────
  backend:
    name: Backend — tests + coverage
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: pool_services_db
          MYSQL_USER: eps_user
          MYSQL_PASSWORD: eps_pass
          MYSQL_ROOT_PASSWORD: root_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -u eps_user -peps_pass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    defaults:
      run:
        shell: bash
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run SQL init scripts
        env:
          MYSQL_PWD: eps_pass
        run: |
          mysql -h 127.0.0.1 -u eps_user pool_services_db < sql/init/01_schema.sql
          mysql -h 127.0.0.1 -u eps_user pool_services_db < sql/init/02_seeds.sql

      - name: Run tests with coverage
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: pool_services_db
          DB_USER: eps_user
          DB_PASSWORD: eps_pass
        run: |
          pytest -q --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml

  # ─────────────────────────────────────────────
  # JOB 2: Frontend build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # JOB 3: Build Docker image and push to registry
  # Uses GITHUB_TOKEN (automatic — no extra secret needed)
  # Only runs on push to main (not on PRs)
  # ─────────────────────────────────────────────
  build-image:
    name: Build — Docker image → ghcr.io
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/ektorg89/ektor-pool-services/api:latest

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to EC2
  # Pulls the pre-built image — no build on EC2
  # Requires secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy — EC2
    runs-on: ubuntu-latest
    needs: [build-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd ~/ektor-pool-api/backend
            git pull origin main
            ./load-secrets.sh
            docker pull ghcr.io/ektorg89/ektor-pool-services/api:latest
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps
